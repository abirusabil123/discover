server {
    listen 8443 ssl;                   # ← changed from 443
    server_name localhost backenddiscover.duckdns.org;
    
    ssl_certificate /etc/nginx/ssl/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/backenddiscover.duckdns.org.key;
    
    location / {
        proxy_pass http://localhost:8090;   # ← changed from http://app:8090
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}