services:
  app:
    build: ./
    # ports:
    #   - "8090:8090"  # HTTP endpoint
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=mydatabase
      - PORT=8090
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend-network
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "password"
      MYSQL_DATABASE: "mydatabase"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      retries: 10
    networks:
      - backend-network
  nginx:
    image: nginx:alpine
    ports:
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/zeitgeist/.acme.sh/backenddiscover.duckdns.org_ecc:/etc/nginx/ssl:ro
    networks:
      - backend-network
    depends_on:
      - app
    restart: unless-stopped
networks:
  backend-network:
    driver: bridge
volumes:
  mysql_data: