services:
  app:
    build: ./
    network_mode: host                 # ← added
    # remove ports and networks sections
    environment:
      - DB_HOST=localhost              # ← changed from "db"
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=mydatabase
      - PORT=8090
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    network_mode: host                 # ← added
    # remove networks section
    environment:
      MYSQL_ROOT_PASSWORD: "password"
      MYSQL_DATABASE: "mydatabase"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      retries: 10

  nginx:
    image: nginx:alpine
    network_mode: host                 # ← added
    # remove ports mapping (now listens directly on host 8443)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/zeitgeist/.acme.sh/backenddiscover.duckdns.org_ecc:/etc/nginx/ssl:ro
    # remove networks section
    depends_on:
      - app
    restart: unless-stopped

# remove networks: section entirely
volumes:
  mysql_data: